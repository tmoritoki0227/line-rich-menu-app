name: Deploy（SAM + Frontend）

on:
  push:
    branches: [main]

permissions:
  id-token: write   # OIDC 認証に必要
  contents: read

jobs:
  # -------------------------------------------------------
  # ① バックエンド + インフラ: SAM でまとめてデプロイ
  # -------------------------------------------------------
  deploy-backend:
    name: Backend - SAM Build & Deploy（Lambda / API Gateway / DynamoDB）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials（OIDC）
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: SAM Build
        # esbuild で TypeScript をビルド
        run: sam build

      - name: SAM Deploy
        # 各パラメータを "" で囲むことで特殊文字を含む値でも正しく渡せる
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "LineChannelAccessToken=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
              "LineChannelSecret=${{ secrets.LINE_CHANNEL_SECRET }}"

  # -------------------------------------------------------
  # ② フロントエンド: ビルド → S3 → CloudFront キャッシュ削除
  # -------------------------------------------------------
  deploy-frontend:
    name: Frontend Build & Deploy（S3 / CloudFront）  # needs: backend 完了後に実行
    runs-on: ubuntu-latest
    needs: deploy-backend   # バックエンドデプロイ後に実行
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Configure AWS credentials（OIDC）
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Upload to S3
        # samconfig.toml からスタック名を読み取り、CloudFormation Outputs でバケット名を取得
        run: |
          STACK_NAME=$(grep 'stack_name' samconfig.toml | sed 's/.*= *"\(.*\)"/\1/')
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          aws s3 sync frontend/dist/ s3://$BUCKET --delete

      - name: Invalidate CloudFront cache
        # samconfig.toml からスタック名を読み取り、CloudFormation Outputs でDistribution IDを取得
        run: |
          STACK_NAME=$(grep 'stack_name' samconfig.toml | sed 's/.*= *"\(.*\)"/\1/')
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
