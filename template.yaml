AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: LINE 家計簿ボット（Lambda / DynamoDB / API Gateway / S3 / CloudFront）

# -------------------------------------------------------
# パラメータ（デプロイ時に値を渡す）
# -------------------------------------------------------
Parameters:
  LineChannelAccessToken:
    Type: String
    NoEcho: true
    Description: LINE channel access token  # LINEチャネルアクセストークン
  LineChannelSecret:
    Type: String
    NoEcho: true
    Description: LINE channel secret  # LINEチャネルシークレット
  UserName:
    Type: String
    Default: moritoki
    Description: Username suffix for S3 bucket name to avoid conflicts in shared AWS accounts  # S3バケット名末尾に付与するユーザー名（同一アカウント内での衝突防止）

# -------------------------------------------------------
# Lambda のデフォルト設定（全 Function に適用）
# -------------------------------------------------------
Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [x86_64]
    Timeout: 15
    Environment:
      Variables:
        TABLE_NAME: !Ref LineBotTable
        MENU_TABLE_NAME: !Ref MenuItemsTable
        ORDERS_TABLE_NAME: !Ref OrdersTable

# -------------------------------------------------------
# リソース定義
# -------------------------------------------------------
Resources:

  # --- DynamoDB ---

  # モバイルオーダー：メニューテーブル
  MenuItemsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete      # スタック削除時にテーブルも削除する（検証用）
    UpdateReplacePolicy: Delete # スタック更新時の置き換えでもテーブルを削除する（検証用）
    Properties:
      TableName: menu-items
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # モバイルオーダー：注文テーブル（GSI で status 別に取得）
  OrdersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete      # スタック削除時にテーブルも削除する（検証用）
    UpdateReplacePolicy: Delete # スタック更新時の置き換えでもテーブルを削除する（検証用）
    Properties:
      TableName: orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-createdAt-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  LineBotTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete      # スタック削除時にテーブルも削除する（検証用）
    UpdateReplacePolicy: Delete # スタック更新時の置き換えでもテーブルを削除する（検証用）
    Properties:
      TableName: line-bot-table-v4
      BillingMode: PAY_PER_REQUEST   # オンデマンド（使った分だけ課金）
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH   # パーティションキー
        - AttributeName: id
          KeyType: RANGE  # ソートキー

  # --- Lambda ---
  LineBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: line-bot-table-v4-handler
      CodeUri: backend/
      Handler: dist/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LineBotTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MenuItemsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
      Environment:
        Variables:
          LINE_CHANNEL_ACCESS_TOKEN: !Ref LineChannelAccessToken
          LINE_CHANNEL_SECRET: !Ref LineChannelSecret
          NODE_OPTIONS: --enable-source-maps   # ソースマップを有効化（エラー時に元ファイルの行番号を表示）
      Events:
        PostTransaction:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /transaction
            Method: POST
        GetHistory:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /history
            Method: GET
        GetSummary:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /summary
            Method: GET
        PostWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /webhook
            Method: POST

        # --- モバイルオーダー ---
        GetMenu:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /menu
            Method: GET
        CreateOrder:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /order
            Method: POST
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /order/{orderId}
            Method: GET
        GetStaffOrders:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /staff/orders
            Method: GET
        UpdateOrderStatus:
          Type: Api
          Properties:
            RestApiId: !Ref LineBotApi
            Path: /staff/orders/{orderId}/status
            Method: PUT
    # SAM の esbuild 統合（TypeScript を自動でビルド）
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Sourcemap: true       # ソースマップ生成（エラー時に元の .ts ファイルの行番号を表示するため）
        EntryPoints:
          - src/index.ts
        External:
          - '@aws-sdk/*'   # Lambda 実行環境に同梱済みのため除外

  # --- API Gateway ---
  LineBotApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: line-bot-api-v4
      StageName: dev
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  # --- S3 バケット（フロントエンドホスティング用）---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-frontend-${UserName}"  # ユーザー名を末尾に付与することで同一アカウント内でも一意になる
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # --- CloudFront OAC（S3 への安全なアクセス制御）---
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "line-rich-menu-app-oac-${UserName}"  # ユーザー名を含めることで同一アカウント内でも一意になる
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # --- S3 バケットポリシー（CloudFront からのみアクセス許可）---
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # --- CloudFront ディストリビューション ---
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: S3Origin
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""  # OAC 使用時は空にする
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # AWS マネージドポリシー: CachingOptimized
        # SPA 用エラーハンドリング（Vue Router の履歴モード対応）
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# -------------------------------------------------------
# デプロイ後に表示される出力値
# -------------------------------------------------------
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL  # APIゲートウェイのエンドポイントURL
    Value: !Sub "https://${LineBotApi}.execute-api.${AWS::Region}.amazonaws.com/dev"
  CloudFrontUrl:
    Description: CloudFront domain URL (set as LIFF endpoint)  # CloudFrontのドメインURL（LIFFエンドポイントに設定する）
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  WebhookUrl:
    Description: LINE Webhook URL (set in LINE Developers console)  # LINE WebhookURL（LINE Developersコンソールに設定する）
    Value: !Sub "https://${LineBotApi}.execute-api.${AWS::Region}.amazonaws.com/dev/webhook"
  FrontendBucketName:
    Description: S3 bucket name for frontend deployment (used by GitHub Actions)  # フロントエンドデプロイ先S3バケット名（GitHub Actionsで使用）
    Value: !Ref FrontendBucket
  CloudFrontDistributionId:
    Description: CloudFront distribution ID (used for cache invalidation in GitHub Actions)  # CloudFrontディストリビューションID（キャッシュ削除・GitHub Actionsで使用）
    Value: !Ref CloudFrontDistribution
  LambdaFunctionName:
    Description: Lambda function name (used by GitHub Actions)  # Lambda関数名（GitHub Actionsで使用）
    Value: !Ref LineBotFunction